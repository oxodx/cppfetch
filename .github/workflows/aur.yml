name: AUR Update

run-name: AUR package update by ${{ github.actor }} release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: "aur"
  cancel-in-progress: true

jobs:
  aur-update:
    environment:
      name: aur-packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: AUR Update
        uses: ./.github/actions/aur
        with:
          pkgname: cppfetch
          pkgbuild: ./packaging/aur/PKGBUILD
          commit_username: oxod
          commit_email: git@oxod.nl
          ssh_private_key: ${{ secrets.AUR_KEY }}
          commit_message: Update AUR package
          ssh_keyscan_types: rsa,ecdsa,ed25519
